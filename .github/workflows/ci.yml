name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  html:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: Lint HTML with htmlhint
        run: npx --yes htmlhint@1 "*.html"

  links:
    name: Check links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Exclude hosts that block automated checkers (LinkedIn returns 999,
          # font preconnect roots 404), plus our own canonical/OG URLs: those
          # point at bensiverly.com and 404 until the page is deployed, so they
          # are never verifiable in-PR. Internal navigation uses relative links,
          # still checked locally via --root-dir. Keeps the check meaningful, not flaky.
          args: >-
            --no-progress
            --max-concurrency 4
            --max-retries 3
            --accept 200,206,403,429,999
            --root-dir "${{ github.workspace }}"
            --exclude "linkedin\.com"
            --exclude "fonts\.gstatic\.com"
            --exclude "fonts\.googleapis\.com"
            --exclude "bensiverly\.com"
            "*.html" "README.md"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      # Page invariants, internal links, sitemap coverage, script syntax,
      # and plant-dataset integrity. Zero dependencies — just node:test.
      - name: Run test suite
        run: node --test
      - name: Validate sitemap.xml is well-formed
        run: |
          python3 -c "import xml.dom.minidom; xml.dom.minidom.parse('sitemap.xml'); print('sitemap.xml is well-formed')"
